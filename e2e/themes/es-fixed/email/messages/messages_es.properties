passwordResetBody=Alguien ha solicitado cambiar las credenciales de tu cuenta de {2}. Si ha sido usted, haga clic en el enlace siguiente para reiniciarlas.\n\n{0}\n\nEste enlace expirará en {3}.\n\nSi no quiere reiniciar sus credenciales, simplemente ignore este mensaje y no se realizará ningún cambio.
